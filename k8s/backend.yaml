apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: anonchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: anonchat-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis.anonchat.svc.cluster.local:6379"
            - name: PORT
              value: "8080"
            - name: ALLOWED_ORIGINS
              value: "https://anonchat.example.com"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: anonchat
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
